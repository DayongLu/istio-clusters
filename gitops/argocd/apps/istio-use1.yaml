---
# 1. Istio Base (Contains CRDs and cluster roles)
# Must be installed first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base-use1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jqPathExpressions:
        - '.webhooks[].clientConfig.caBundle'
        - '.webhooks[].failurePolicy'

  project: default
  source:
    repoURL: 'https://istio-release.storage.googleapis.com/charts'
    chart: base
    targetRevision: 1.29.1 # Update to your desired Istio version
  destination:
    name: 'eks-auto-cluster-use1'
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# 2. Istiod (The Control Plane)
# Installed second, after the CRDs are ready.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod-use1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jqPathExpressions:
        - '.webhooks[].clientConfig.caBundle'
        - '.webhooks[].failurePolicy'
  project: default
  source:
    repoURL: 'https://istio-release.storage.googleapis.com/charts'
    chart: istiod
    targetRevision: 1.29.1 # Must match the base version
    helm:
      parameters:
        - name: global.meshID
          value: mesh1
        - name: global.multiCluster.clusterName
          value: eks-auto-cluster-use1
        - name: global.network
          value: use1-network
  destination:
    name: 'eks-auto-cluster-use1'
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# 3. Istiod east west gateway

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-east-west-gateway-use1
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: 'https://istio-release.storage.googleapis.com/charts'
    chart: gateway
    targetRevision: 1.29.1 # Must match the base version
    helm:
      parameters:
        - name: name
          value: istio-eastwestgateway
        - name: networkGateway
          value: use1-network
  destination:
    name: 'eks-auto-cluster-use1'
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true